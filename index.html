<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CyberCert Academy</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <h1>CyberCert Academy</h1>
            <p>Plataforma de Certificación Técnica</p>
        </div>
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="andres@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres">
                <small id="passwordHelp" class="error-text"></small>
            </div>
            <button type="submit" class="btn-primary">Ingresar al Dashboard</button>
        </form>
        <p class="register-link">¿No tienes cuenta? <a href="#">Regístrate aquí</a></p>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
