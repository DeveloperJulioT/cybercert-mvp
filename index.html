<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CyberCert Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-body">
    
    <div class="split-container">
        <div class="split-left">
            <img src="assets/img/cybersecurity-concept-padlock-circuit-board.jpg" alt="Ilustración de trabajo en equipo" id="login-img">
        </div>

        <div class="split-right">
            <div class="login-box">
                <h1 class="brand-title">EduTech Platform</h1>
                <h2>Login</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="email" id="email" required placeholder="Username">
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" required placeholder="Password">
                    </div>
                    <small id="passwordHelp" class="error-text" style="color: #fca5a5; margin-top: -10px; margin-bottom: 10px; display: block; text-align: center;"></small>

                    <div class="options-row">
                        <label>
                            <input type="checkbox" id="remember"> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot your password?</a>
                    </div>

                    <button type="submit" class="btn-login">LOGIN</button>
                </form>
            </div>
            
            <p class="signup-text">New here? <a href="#">Sign Up</a></p>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
